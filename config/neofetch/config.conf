# ┌──────────────────────────────────────────────────┐
# │  Purple Minimal - Neofetch Configuration         │
# └──────────────────────────────────────────────────┘

print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "WM" wm
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory

    info cols
}

# ── Title ────────────────────────────────────────────
title_fqdn="off"

# ── Kernel ───────────────────────────────────────────
kernel_shorthand="on"

# ── Distro ───────────────────────────────────────────
distro_shorthand="off"
os_arch="on"

# ── Uptime ───────────────────────────────────────────
uptime_shorthand="on"

# ── Memory ───────────────────────────────────────────
memory_percent="on"
memory_unit="gib"

# ── Packages ─────────────────────────────────────────
package_managers="on"

# ── Shell ────────────────────────────────────────────
shell_path="off"
shell_version="on"

# ── CPU ──────────────────────────────────────────────
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# ── GPU ──────────────────────────────────────────────
gpu_brand="on"
gpu_type="all"

# ── Desktop Environment ─────────────────────────────
de_version="off"

# ── Text Colors ──────────────────────────────────────
colors=(5 7 5 5 5 7)

# ── Text Options ─────────────────────────────────────
bold="on"
underline_enabled="on"
underline_char="-"
separator=":"

# ── Color Blocks ─────────────────────────────────────
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# ── Backend ──────────────────────────────────────────
image_backend="ascii"
image_source="auto"

# ── ASCII ────────────────────────────────────────────
ascii_distro="auto"
ascii_colors=(5 7)
ascii_bold="on"

# ── Image Options ────────────────────────────────────
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=3

# ── Misc ─────────────────────────────────────────────
stdout="off"
