; ┌──────────────────────────────────────────────────┐
; │  Purple Minimal - Polybar Configuration          │
; │  Inspired by u/muvoksi's r/unixporn setup       │
; └──────────────────────────────────────────────────┘

; ── Colors ───────────────────────────────────────────
[colors]
background = #e62f1e2e
background-alt = #3d2e4a
foreground = #a39e9b
foreground-alt = #d0d0d0

primary = #9928b5
secondary = #815ba4
alert = #984141

black = #1b1b1b
red = #ef6155
green = #48b685
yellow = #fec418
blue = #06b6ef
magenta = #815ba4
cyan = #5bc4bf
white = #d0d0d0
accent = #96e61e

; ── Bar Settings ─────────────────────────────────────
[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 36
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-size = 0
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 1

; ── Fonts ────────────────────────────────────────────
font-0 = "Roboto Medium:size=11;2"
font-1 = "Font Awesome 5 Free Solid:size=11;2"
font-2 = "Font Awesome 5 Free Regular:size=11;2"
font-3 = "Font Awesome 5 Brands Regular:size=11;2"
font-4 = "Roboto:size=9;2"

; ── Module Layout ────────────────────────────────────
modules-left = xwindow
modules-center = i3
modules-right = cpu memory pulseaudio date powermenu

; ── System Tray ──────────────────────────────────────
tray-position = right
tray-padding = 4
tray-background = ${colors.background}
tray-maxsize = 20

; ── Cursor ───────────────────────────────────────────
cursor-click = pointer
cursor-scroll = ns-resize

; ── WM ───────────────────────────────────────────────
wm-restack = i3
override-redirect = false

; ── Scroll ───────────────────────────────────────────
enable-ipc = true

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; ── MODULES ──────────────────────────────────────────
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

; ── i3 Workspaces ────────────────────────────────────
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
strip-wsnumbers = true

; Focused workspace
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2
label-focused-foreground = ${colors.foreground-alt}

; Unfocused workspace
label-unfocused = %name%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.foreground}

; Visible but not focused (multi-monitor)
label-visible = %name%
label-visible-background = ${colors.background}
label-visible-underline = ${colors.secondary}
label-visible-padding = 2

; Urgent workspace
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground-alt}
label-urgent-padding = 2

; Mode indicator (e.g. resize)
label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.foreground-alt}
label-mode-background = ${colors.primary}

; ── Window Title ─────────────────────────────────────
[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.foreground}
format-padding = 2

; ── CPU ──────────────────────────────────────────────
[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.cyan}
label = %percentage:2%%
label-foreground = ${colors.foreground}

; ── Memory ───────────────────────────────────────────
[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.magenta}
label = %percentage_used:2%%
label-foreground = ${colors.foreground}

; ── PulseAudio ───────────────────────────────────────
[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

format-muted-prefix = " "
format-muted-prefix-foreground = ${colors.red}
label-muted = muted
label-muted-foreground = ${colors.foreground}

ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 =
ramp-volume-foreground = ${colors.green}

click-right = pavucontrol

; ── Date/Time ────────────────────────────────────────
[module/date]
type = internal/date
interval = 1

date = "%a %b %d"
date-alt = "%Y-%m-%d"

time = "%H:%M"
time-alt = "%H:%M:%S"

format-prefix = " "
format-prefix-foreground = ${colors.blue}

label = %date%  %time%
label-foreground = ${colors.foreground}

; ── Power Menu ───────────────────────────────────────
[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-open =
label-open-foreground = ${colors.red}
label-open-padding = 1
label-close =  cancel
label-close-foreground = ${colors.green}
label-close-padding = 1
label-separator = |
label-separator-foreground = ${colors.foreground}

menu-0-0 = reboot
menu-0-0-exec = systemctl reboot
menu-0-1 = shutdown
menu-0-1-exec = systemctl poweroff
menu-0-2 = logout
menu-0-2-exec = i3-msg exit

; ── Global WM Settings ──────────────────────────────
[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
