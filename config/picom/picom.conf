# ┌──────────────────────────────────────────────────┐
# │  Purple Minimal - Picom Compositor Configuration │
# │  Inspired by u/muvoksi's compton config          │
# └──────────────────────────────────────────────────┘

# ── Backend ──────────────────────────────────────────
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

# ── VSync ────────────────────────────────────────────
vsync = true;

# ── Shadows ──────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-color = "#1b1b1b";

# Exclude shadows on certain windows
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fading ───────────────────────────────────────────
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Exclude fading on certain windows
fade-exclude = [];

# ── Opacity ──────────────────────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Dock/panel opacity
opacity-rule = [
    "80:class_g = 'Polybar'",
    "90:class_g = 'Rofi'"
];

# ── Corner Radius ────────────────────────────────────
corner-radius = 6;

corner-radius-exclude = [
    "class_g = 'Polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Blur ─────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 3;
blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Window Type Settings ────────────────────────────
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
};

# ── Focus ────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

# ── Log ──────────────────────────────────────────────
log-level = "warn";
